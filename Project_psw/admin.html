<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SibsSpoon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; background: #faf7f2; color: #3e2723; height: 100vh; }
        
        .sidebar { width: 250px; background: #3e2723; color: #fff; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; text-align: center; margin-bottom: 30px; color: #d4a373; }
        .nav-item { padding: 15px 25px; color: #d7ccc8; text-decoration: none; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #d4a373; color: #fff; }
        .logout-btn { margin-top: auto; background: #c0392b; color: white; border: none; padding: 15px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .logout-btn:hover { background: #e74c3c; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Playfair Display', serif; }
        
        .cards { display: flex; gap: 20px; margin-bottom: 40px; }
        .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex: 1; border-left: 5px solid #d4a373; }
        .card h3 { font-size: 1rem; color: #7f8c8d; margin-bottom: 10px; }
        .card h2 { font-size: 2rem; color: #3e2723; }

        .table-container { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .table-container h2 { margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #3e2723; font-weight: 600; }
        tr:hover { background: #fdfbf9; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-spoon"></i> SibsSpoon
        </div>
        <a href="#" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fas fa-receipt"></i> Orders</a>
        <a href="#" class="nav-item"><i class="fas fa-box"></i> Products</a>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Admin Overview</h1>
            <p>Welcome back, <strong id="adminName">Admin</strong>!</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total Orders</h3>
                <h2 id="totalOrdersCounter">0</h2>
            </div>
            <div class="card">
                <h3>Total Revenue</h3>
                <h2 id="totalRevenueCounter">Rp 0</h2>
            </div>
        </div>

        <div class="table-container">
            <h2>Recent Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Date</th>
                        <th>Total Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center;">Loading data from database...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem('userRole');
            if (role !== 'admin') {
                alert('Akses Ditolak! Anda bukan Admin. Silakan login dari halaman utama.');
                window.location.href = 'index.html'; 
            } else {
                const username = localStorage.getItem('username');
                if (username && username !== 'null') {
                    document.getElementById('adminName').innerText = username.charAt(0).toUpperCase() + username.slice(1);
                } else {
                    document.getElementById('adminName').innerText = "Admin Utama";
                }
                loadOrders(); 
            }
        });

        function loadOrders() {
            fetch('get_order.php')
                .then(response => response.json())
                .then(orders => {
                    const tbody = document.getElementById('orderTableBody');
                    const totalOrdersElem = document.getElementById('totalOrdersCounter');
                    const totalRevenueElem = document.getElementById('totalRevenueCounter');
                    
                    tbody.innerHTML = '';
                    let totalRevenue = 0;

                    if (orders.error || orders.status === "error") {
                        const errMsg = orders.error || orders.message || "Gagal memuat data.";
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">${errMsg}</td></tr>`;
                        return;
                    }

                    if (orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Belum ada pesanan masuk.</td></tr>';
                        return;
                    }

                    orders.forEach(order => {
                        const price = order.total_price ? parseFloat(order.total_price) : 0;
                        totalRevenue += price;
                        
                        let formattedDate = "-";
                        if (order.order_date) {
                            const dateObj = new Date(order.order_date);
                            formattedDate = dateObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td>#ORD-${order.order_id}</td>
                                <td>${order.customer_name || 'Anonim'}</td>
                                <td>${formattedDate}</td>
                                <td>Rp ${price.toLocaleString('id-ID')}</td>
                                <td><span class="status">${order.status}</span></td>
                            </tr>
                        `;
                    });

                    totalOrdersElem.innerText = orders.length;
                    totalRevenueElem.innerText = 'Rp ' + totalRevenue.toLocaleString('id-ID');
                })
                .catch(error => {
                    document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Gagal memuat data dari database.</td></tr>';
                });
        }

        function logout() {
            if (confirm('Apakah Anda yakin ingin keluar?')) {
                localStorage.removeItem('userRole');
                localStorage.removeItem('username');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
